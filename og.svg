<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Subtle gold radial glow -->
  <circle cx="600" cy="280" r="300" fill="none" stroke="#C4A87A" stroke-width="0.5" opacity="0.06"/>
  <circle cx="600" cy="280" r="200" fill="none" stroke="#C4A87A" stroke-width="0.5" opacity="0.04"/>
  <!-- Top gold line -->
  <line x1="360" y1="180" x2="840" y2="180" stroke="#C4A87A" stroke-width="1" opacity="0.15"/>
  <!-- Logo -->
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="36" font-weight="500" fill="#E8E4DF" letter-spacing="-0.5">murm<tspan fill="#C4A87A">web</tspan>.dev</text>
  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#E8E4DF" letter-spacing="-1">I build stores that <tspan font-style="italic" fill="#C4A87A">actually</tspan> sell</text>
  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#8A8580">Shopify · Next.js · Supabase — Based in the Netherlands</text>
  <!-- Bottom gold line -->
  <line x1="360" y1="440" x2="840" y2="440" stroke="#C4A87A" stroke-width="1" opacity="0.15"/>
</svg>
